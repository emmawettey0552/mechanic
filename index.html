<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oboye Autoshop</title>

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0f1a;
color:#fff;
overflow-x:hidden;
}

/* ================= PRELOADER ================= */

#preloader{
position:fixed;
inset:0;
background:#05070d;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
transition:opacity 0.8s ease;
overflow:hidden;
}

#preloader .overlay{
position:absolute;
inset:0;
background:
linear-gradient(rgba(0,0,0,0.88),rgba(0,0,0,0.92)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
filter:blur(5px) brightness(0.35);
transform:scale(1.1);
}

.loader-box{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;

padding:28px 30px;
border-radius:18px;

background:rgba(17,24,43,0.55);
backdrop-filter:blur(12px);
box-shadow:0 0 40px rgba(0,255,204,0.15);
text-align:center;
}

/* CAR */

.car-loader{
width:160px;
height:70px;
position:relative;
animation:bounce 1.4s infinite ease-in-out;
}

.car-body{
width:160px;
height:40px;
background:linear-gradient(135deg,#00ffcc,#007a66);
border-radius:18px;
position:absolute;
top:10px;
box-shadow:0 0 25px rgba(0,255,204,0.7);
}

.car-body::before{
content:"";
position:absolute;
width:70px;
height:22px;
background:#0b0f1a;
top:-14px;
left:45px;
border-radius:10px;
}

.wheel{
position:absolute;
bottom:0;
width:28px;
height:28px;
background:#111;
border:4px solid #666;
border-radius:50%;
animation:spin 0.7s linear infinite;
}

.wheel1{left:25px;}
.wheel2{right:25px;}

/* TEXT */

.logo-text{
font-size:34px;
letter-spacing:4px;
color:#00ffcc;
text-shadow:0 0 18px #00ffcc;
animation:glow 2s infinite alternate;
}

.loading-text{
font-size:14px;
color:#ccc;
}

.loading-bar{
width:260px;
height:6px;
background:#1b2236;
border-radius:20px;
overflow:hidden;
}

.loading-progress{
width:0%;
height:100%;
background:#00ffcc;
animation:load 2.5s forwards;
box-shadow:0 0 20px #00ffcc;
}

/* ================= HERO ================= */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
perspective:1000px;
overflow:hidden;
background:#0b0f1a;
}

.hero-content{
position:absolute;
top:40px;
text-align:center;
z-index:5;
}

.hero h1{
font-size:48px;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
}

.hero p{
color:#ccc;
margin-top:10px;
}

/* 3D CAR */

.car-3d{
position:relative;
width:260px;
height:120px;
transform-style:preserve-3d;
animation:spinCar 6s linear infinite;
margin-top:120px;
}

.car-body-main{
position:absolute;
width:260px;
height:60px;
background:linear-gradient(135deg,#00ffcc,#007a66);
border-radius:20px;
top:30px;
box-shadow:0 0 30px rgba(0,255,204,0.6);
}

.car-body-main::before{
content:"";
position:absolute;
width:140px;
height:40px;
background:#11182b;
top:-30px;
left:60px;
border-radius:10px;
}

.wheel-main{
position:absolute;
width:45px;
height:45px;
background:#111;
border:6px solid #666;
border-radius:50%;
bottom:0;
animation:wheelSpin 0.8s linear infinite;
}

.w1{left:40px;}
.w2{right:40px;}

.shadow{
position:absolute;
width:240px;
height:20px;
background:rgba(0,0,0,0.4);
bottom:-10px;
left:10px;
border-radius:50%;
filter:blur(8px);
}

/* ================= SPEEDOMETER ================= */

.dashboard{
position:absolute;
bottom:30px;
z-index:10;
}

.speedometer{
width:180px;
height:180px;
background:rgba(17,24,43,0.8);
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 25px rgba(0,255,204,0.3);
}

.dial{
width:120px;
height:120px;
border:4px solid #00ffcc;
border-radius:50%;
position:relative;
}

.needle{
width:3px;
height:55px;
background:red;
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
transform:rotate(-90deg);
transition:transform 0.6s ease;
}

.center-dot{
width:10px;
height:10px;
background:#00ffcc;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.speed-text{
margin-top:10px;
font-size:13px;
color:#ccc;
}

/* ================= ANIMATIONS ================= */

@keyframes spinCar{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(360deg);}
}

@keyframes wheelSpin{
100%{transform:rotate(360deg);}
}

@keyframes glow{
from{text-shadow:0 0 10px #00ffcc;}
to{text-shadow:0 0 25px #00ffcc;}
}

@keyframes load{
to{width:100%;}
}

@keyframes bounce{
50%{transform:translateY(-6px);}
}

/* MOBILE */

@media(max-width:768px){
.hero h1{font-size:30px;}
.car-3d{transform:scale(0.8);}
}

</style>
</head>

<body>

<!-- ================= PRELOADER ================= -->

<div id="preloader">

<div class="overlay"></div>

<div class="loader-box">

<div class="car-loader">
<div class="car-body"></div>
<div class="wheel wheel1"></div>
<div class="wheel wheel2"></div>
</div>

<h1 class="logo-text">OBOYE AUTOSHOP</h1>
<p class="loading-text">Initializing Automotive System...</p>

<div class="loading-bar">
<div class="loading-progress"></div>
</div>

</div>
</div>

<!-- ENGINE SOUND -->
<audio id="engineSound" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c8b1b1e5b.mp3?filename=car-engine-start-11366.mp3">
</audio>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="hero-content">
<h1>Welcome to Oboye Autoshop</h1>
<p>Professional Car Diagnostics & Repair</p>
</div>

<!-- 3D CAR -->
<div class="car-3d">

<div class="car-body-main"></div>

<div class="wheel-main w1"></div>
<div class="wheel-main w2"></div>

<div class="shadow"></div>

</div>

<!-- SPEEDOMETER -->
<div class="dashboard">

<div class="speedometer">

<div class="dial">
<div class="needle" id="needle"></div>
<div class="center-dot"></div>
</div>

<p class="speed-text">
SPEED: <span id="speedValue">0</span> KM/H
</p>

</div>

</div>

</section>

<script>

/* PRELOADER */

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("preloader").style.opacity="0";

setTimeout(()=>{
document.getElementById("preloader").remove();
},1000);

},2500);

});

/* ENGINE SOUND */

const engine=document.getElementById("engineSound");
let started=false;

document.body.addEventListener("click",()=>{

if(!started){
engine.volume=0.3;
engine.play().catch(()=>{});
started=true;
}

},{once:true});

/* SPEEDOMETER */

const needle=document.getElementById("needle");
const speedValue=document.getElementById("speedValue");

const car=document.querySelector(".car-3d");

function updateSpeed(){

let speed=90;

if(car.classList.contains("fast")){
speed=180;
needle.style.transform="rotate(60deg)";
}

else if(car.classList.contains("slow")){
speed=30;
needle.style.transform="rotate(-60deg)";
}

else{
speed=90;
needle.style.transform="rotate(0deg)";
}

speedValue.textContent=speed;

}

setInterval(updateSpeed,500);

</script>

</body>
</html>
