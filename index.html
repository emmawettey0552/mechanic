<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oboye Autoshop</title>

<style>

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#0b0f1a;
color:#fff;
overflow-x:hidden;
}

/* =========================
   MODERN PRELOADER (FROM FIRST CODE)
========================= */
#preloader{
position:fixed;
inset:0;
background:#05070d;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
flex-direction:column;
transition:opacity 0.8s ease;
}

.pre-bg{
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
filter:blur(5px) brightness(0.3);
transform:scale(1.1);
}

.car-loader{
width:160px;
height:70px;
position:relative;
animation:float 1.6s infinite ease-in-out;
z-index:2;
}

.car-body{
width:160px;
height:40px;
background:linear-gradient(90deg,#00ffcc,#00aaff);
border-radius:20px;
position:absolute;
top:10px;
box-shadow:0 0 25px #00ffcc;
}

.wheel{
width:30px;
height:30px;
background:#111;
border:5px solid #666;
border-radius:50%;
position:absolute;
bottom:0;
animation:spin 0.7s linear infinite;
}

.wheel1{left:20px;}
.wheel2{right:20px;}

.loading-text{
margin-top:15px;
color:#ccc;
z-index:2;
}

.loading-bar{
width:240px;
height:6px;
background:#1b2236;
border-radius:20px;
margin-top:15px;
overflow:hidden;
z-index:2;
}

.loading-progress{
width:0%;
height:100%;
background:#00ffcc;
animation:load 2.5s forwards;
}

/* ===== GARAGE INTRO (SECOND CODE KEEP) ===== */
#garageIntro{
position:fixed;
inset:0;
z-index:10000;
display:flex;
perspective:1400px;
background:#000;
overflow:hidden;
}

.garage-bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:garageSlide 12s infinite;
filter:brightness(0.5);
}

.g1{background-image:url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7');}
.g2{background-image:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');}
.g3{background-image:url('https://images.unsplash.com/photo-1487754180451-c456f719a1fc');}

.g2{animation-delay:4s;}
.g3{animation-delay:8s;}

@keyframes garageSlide{
0%{opacity:0;transform:scale(1.1);}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

.door{
width:50%;
height:100%;
background:#111;
transition:transform 2s ease;
}

.leftDoor{transform-origin:left;}
.rightDoor{transform-origin:right;}

#garageIntro.open .leftDoor{transform:rotateY(-110deg);}
#garageIntro.open .rightDoor{transform:rotateY(110deg);}

/* ===== HEADER ===== */
header{
padding:15px;
background:#11182b;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

/* ===== HERO ===== */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
filter:brightness(0.4);
animation:heroSlide 15s infinite;
transform:scale(1.1);
}

.hero h1,.hero p{position:relative;z-index:2;}

.hero h1{font-size:45px;}

/* ===== SECTIONS ===== */
.section{
padding:40px;
text-align:center;
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#11182b;
padding:20px;
width:250px;
border-radius:10px;
transition:0.3s;
}

.card:hover{transform:scale(1.05);}

/* PROJECT SLIDER */
.project-slider{
max-width:500px;
margin:auto;
overflow:hidden;
border-radius:10px;
}

.project-slider img{
width:100%;
display:none;
}

.project-slider img.active{display:block;}

/* STAR EFFECT */
.star{
position:fixed;
top:-10px;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:fall linear;
z-index:9998;
}

@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

/* ===== ANIMATIONS ===== */
@keyframes spin{100%{transform:rotate(360deg);}}
@keyframes float{50%{transform:translateY(-6px);}}
@keyframes load{to{width:100%;}}

@keyframes heroSlide{
0%{background-image:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');}
50%{background-image:url('https://images.unsplash.com/photo-1487754180451-c456f719a1fc');}
100%{background-image:url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7');}
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:30px;}
.card{width:100%;}
}

</style>
</head>

<body>

<!-- ===== MODERN PRELOADER (REPLACED) ===== -->
<div id="preloader">
<div class="pre-bg"></div>

<div class="car-loader">
<div class="car-body"></div>
<div class="wheel wheel1"></div>
<div class="wheel wheel2"></div>
</div>

<p class="loading-text">Loading Oboye Autoshop Experience...</p>

<div class="loading-bar">
<div class="loading-progress"></div>
</div>
</div>

<!-- ===== GARAGE INTRO (UNCHANGED) ===== -->
<div id="garageIntro">
<div class="garage-bg g1"></div>
<div class="garage-bg g2"></div>
<div class="garage-bg g3"></div>
<div class="door leftDoor"></div>
<div class="door rightDoor"></div>
</div>

<header>
<h2>Oboye Autoshop</h2>
</header>

<section class="hero">
<h1>Welcome to Oboye Autoshop</h1>
<p>Your trusted car repair & diagnostics center</p>
</section>

<section class="section">
<h2>About Us</h2>
<p>We provide high-quality automobile repair, diagnostics and tuning services.</p>
</section>

<section class="section">
<h2>Projects</h2>
<div class="project-slider">
<img class="active" src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<img src="https://images.unsplash.com/photo-1487754180451-c456f719a1fc">
</div>
</section>

<audio id="engineStart" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c8b1b1e5b.mp3"></audio>
<audio id="welcomeMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

/* ===== START SEQUENCE ===== */
window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("garageIntro").classList.add("open");
},400);

setTimeout(()=>{
document.getElementById("garageIntro").remove();
document.getElementById("preloader").style.opacity="0";
setTimeout(()=>document.getElementById("preloader").remove(),800);
},3000);

/* STAR EFFECT */
setInterval(()=>{
for(let i=0;i<3;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(star);
setTimeout(()=>star.remove(),5000);
}
},800);

});

/* SLIDER */
let i=0;
function slider(){
let imgs=document.querySelectorAll(".project-slider img");
imgs.forEach(img=>img.classList.remove("active"));
i=(i+1)%imgs.length;
imgs[i].classList.add("active");
}
setInterval(slider,3000);

</script>

</body>
</html>
