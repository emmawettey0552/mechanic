<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oboye Auto Mechanic</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:#f1f5f9;
  padding-top:70px;
}

/* NAV */
header{
  position:fixed;
  top:0;width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);
}

header h1{color:#38bdf8;font-size:1.2rem;}
.menu-icon{font-size:26px;color:#38bdf8;cursor:pointer;}

#sideMenu{
  position:fixed;right:-280px;top:0;
  width:280px;height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
}

#sideMenu.active{right:0;}

#overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
}

#overlay.active{display:block;}

.hero{text-align:center;padding:50px 20px;}

.hero h2{color:#38bdf8;}

.listen-btn, .stop-btn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.listen-btn{background:#38bdf8;color:#000;}
.stop-btn{background:#ef4444;color:#fff;}

section{padding:40px 20px;text-align:center;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:12px;
}

footer{
  text-align:center;
  padding:20px;
  background:#020617;
}

.whatsapp{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#25D366;
  padding:14px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>
  <h1>Oboye Auto</h1>
  <div class="menu-icon" onclick="openMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<nav id="sideMenu">
  <div onclick="closeMenu()">✖</div>
  <a href="#">Home</a>
  <a href="#services">Services</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <h2>4x4 & Pickup Specialist</h2>
  <p>Professional Auto Repair You Can Trust</p>

  <button class="listen-btn" onclick="startSpeech()">🔊 Listen</button>
  <button class="stop-btn" onclick="stopSpeech()">⛔ Stop</button>
</section>

<section id="services">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Engine Repair</div>
    <div class="card">4x4 Suspension</div>
    <div class="card">Diagnostics</div>
    <div class="card">Mobile Mechanic</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>📞 0590000008</p>
</section>

<footer>
  © 2026 Oboye Auto Mechanic
</footer>

<a class="whatsapp" href="https://wa.me/233590000008">💬</a>
<script>

/* MENU */
function openMenu(){
  document.getElementById("sideMenu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
  document.getElementById("sideMenu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* ================= SPEECH ENGINE FIXED ================= */

let voices = [];
let unlocked = false;

/* LOAD VOICES SAFELY */
function loadVoices(){
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* CORE SPEECH */
function speakText(){

  const text = `
  Welcome to Oboye Auto Mechanic Workshop.

  We specialize in pickup trucks, four by four vehicles, engine diagnostics, suspension systems, and full automotive repair.

  We provide professional, reliable, and affordable vehicle services.

  Call us today for trusted mechanical care.
  `;

  let speech = new SpeechSynthesisUtterance(text);

  // WAIT until voices are available
  let selectedVoice =
    voices.find(v => v.lang.includes("en")) ||
    voices[0];

  if(selectedVoice){
    speech.voice = selectedVoice;
  }

  speech.rate = 0.9;
  speech.pitch = 1;
  speech.volume = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

/* AUTO START (ATTEMPT) */
window.addEventListener("load", () => {
  setTimeout(() => {
    speakText();
  }, 1200);
});

/* STRONG MOBILE UNLOCK (IMPORTANT FIX) */
function unlockAndSpeak(){
  if(unlocked) return;

  speechSynthesis.cancel();
  speechSynthesis.resume();
  speakText();

  unlocked = true;
}

document.addEventListener("click", unlockAndSpeak);
document.addEventListener("touchstart", unlockAndSpeak);

</script>
</body>
</html>
